pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{ts,tsx,js,jsx}'
      run: pnpm exec eslint {staged_files}
    format:
      glob: '*.{ts,tsx,js,jsx,json,md}'
      run: pnpm exec prettier --check {staged_files}
    typecheck:
      run: pnpm run typecheck

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
